<!-- Hand-drawn hero scene: rolling hills, sun, distant mountains, lone lantern.
     Designed to sit behind the hero text. Strokes use ink/cream tokens. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF1E0"/>
      <stop offset="0.55" stop-color="#FAF4EC"/>
      <stop offset="1" stop-color="#FCEADD"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.78" cy="0.18" r="0.35">
      <stop offset="0" stop-color="#FBE2CB"/>
      <stop offset="0.55" stop-color="#F2C99C" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#F2C99C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B6D7A8"/>
      <stop offset="1" stop-color="#7FB069"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7B8E0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#9B85C6" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="hill3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A8D5E5" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#6DB7CE" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="700" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="940" cy="170" r="260" fill="url(#sun)"/>
  <circle cx="940" cy="170" r="58" fill="#FBE2CB" opacity="0.9"/>

  <!-- Distant mountains -->
  <path d="M0 460 Q 130 380 240 430 T 470 410 T 720 440 T 980 400 T 1200 450 V 700 H 0 Z"
        fill="url(#hill3)"/>

  <!-- Mid hills -->
  <path d="M0 510 Q 160 430 320 490 T 620 480 T 920 470 T 1200 510 V 700 H 0 Z"
        fill="url(#hill2)"/>

  <!-- Closest meadow -->
  <path d="M0 580 Q 220 520 460 570 T 880 560 T 1200 580 V 700 H 0 Z"
        fill="url(#hill1)"/>

  <!-- Lantern post at the meadow crest -->
  <g transform="translate(810 538)">
    <line x1="0" y1="0" x2="0" y2="34" stroke="#2A1F17" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="-9" y="-15" width="18" height="18" rx="3" fill="#FBE2CB" stroke="#2A1F17" stroke-width="1.5"/>
    <line x1="-9" y1="-5" x2="9" y2="-5" stroke="#2A1F17" stroke-width="1"/>
    <line x1="0" y1="-22" x2="0" y2="-15" stroke="#2A1F17" stroke-width="1.5"/>
    <circle cx="0" cy="-6" r="2.5" fill="#E0A458"/>
  </g>

  <!-- Tall grass blades on the meadow -->
  <g stroke="#5E8C4A" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M120 600 Q 122 580 118 562"/>
    <path d="M140 605 Q 144 588 138 568"/>
    <path d="M210 595 Q 212 575 208 558"/>
    <path d="M340 615 Q 344 595 338 575"/>
    <path d="M460 605 Q 462 585 458 568"/>
    <path d="M600 620 Q 604 600 596 580"/>
    <path d="M720 612 Q 724 590 716 572"/>
    <path d="M950 622 Q 954 600 948 580"/>
    <path d="M1080 615 Q 1084 595 1076 575"/>
  </g>

  <!-- Tiny daisy-ish dots scattered for warmth -->
  <g fill="#FBE2CB" opacity="0.9">
    <circle cx="180" cy="612" r="2"/>
    <circle cx="290" cy="600" r="2"/>
    <circle cx="430" cy="615" r="2"/>
    <circle cx="560" cy="608" r="2"/>
    <circle cx="690" cy="612" r="2"/>
    <circle cx="780" cy="600" r="2"/>
    <circle cx="900" cy="616" r="2"/>
    <circle cx="1040" cy="610" r="2"/>
  </g>
</svg>

<!-- A small Ghibli-ish soot-sprite-meets-totoro mascot.
     Round body, soft fur strokes, big quiet eyes, holding a single leaf.
     Used as the friendly anchor in the hero. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" aria-hidden="true">
  <defs>
    <radialGradient id="body" cx="0.5" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#8C7A66"/>
      <stop offset="1" stop-color="#5B4A3A"/>
    </radialGradient>
    <radialGradient id="belly" cx="0.5" cy="0.6" r="0.5">
      <stop offset="0" stop-color="#FAF1E0"/>
      <stop offset="1" stop-color="#F2E8D8"/>
    </radialGradient>
  </defs>

  <!-- Soft shadow on the ground -->
  <ellipse cx="110" cy="222" rx="74" ry="9" fill="#000" opacity="0.10"/>

  <!-- Body -->
  <path d="M110 30
           C 60 30 30 70 30 120
           C 30 180 60 220 110 220
           C 160 220 190 180 190 120
           C 190 70 160 30 110 30 Z"
        fill="url(#body)"/>

  <!-- Ears (small) -->
  <path d="M58 56 C 56 36 70 28 78 40 L 70 64 Z" fill="#5B4A3A"/>
  <path d="M162 56 C 164 36 150 28 142 40 L 150 64 Z" fill="#5B4A3A"/>

  <!-- Belly -->
  <path d="M110 78
           C 78 78 64 108 64 138
           C 64 174 84 202 110 202
           C 136 202 156 174 156 138
           C 156 108 142 78 110 78 Z"
        fill="url(#belly)"/>

  <!-- Belly marks (chevrons) -->
  <g stroke="#5B4A3A" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.6">
    <path d="M92 124 L 102 134 L 92 144"/>
    <path d="M128 124 L 118 134 L 128 144"/>
    <path d="M104 158 L 110 164 L 116 158"/>
  </g>

  <!-- Eyes -->
  <ellipse cx="86" cy="108" rx="9" ry="11" fill="#1A1209"/>
  <ellipse cx="134" cy="108" rx="9" ry="11" fill="#1A1209"/>
  <circle cx="89" cy="104" r="2.6" fill="#FAF1E0"/>
  <circle cx="137" cy="104" r="2.6" fill="#FAF1E0"/>

  <!-- Soft cheeks -->
  <ellipse cx="72" cy="128" rx="9" ry="5" fill="#F4B6C2" opacity="0.55"/>
  <ellipse cx="148" cy="128" rx="9" ry="5" fill="#F4B6C2" opacity="0.55"/>

  <!-- Tiny smile -->
  <path d="M104 132 Q 110 138 116 132" stroke="#1A1209" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Whiskers -->
  <g stroke="#3B2E22" stroke-width="1.4" stroke-linecap="round" opacity="0.7">
    <line x1="54" y1="124" x2="74" y2="126"/>
    <line x1="54" y1="132" x2="74" y2="132"/>
    <line x1="146" y1="126" x2="166" y2="124"/>
    <line x1="146" y1="132" x2="166" y2="132"/>
  </g>

  <!-- Leaf held above the head -->
  <g transform="translate(110 14) rotate(-12)">
    <path d="M0 0 Q 22 -10 30 10 Q 22 26 0 16 Z" fill="#7FB069"/>
    <path d="M0 0 Q 14 8 28 14" stroke="#3F6B30" stroke-width="1.2" fill="none"/>
  </g>
</svg>
